name: Deployment issue
description: Report a reproducible Crux self-hosted deployment problem.
title: "deploy: "
labels: ["deployment"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Include Docker version, CRUX_VERSION, compose command, and logs with secrets removed.
    validations:
      required: true
